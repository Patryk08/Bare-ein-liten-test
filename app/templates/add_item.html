<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legg til matrett - Pizza Restaurant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>➕ Legg til ny matrett</h1>
        
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <div class="form-group">
                <label for="name">Navn på matrett *</label>
                <input type="text" id="name" name="name" placeholder="f.eks. Margherita" required>
            </div>
            
            <div class="form-group">
                <label for="description">Beskrivelse</label>
                <textarea id="description" name="description" placeholder="Beskrivelse av ingredienser og tilberedning"></textarea>
            </div>
            
            <div class="form-group">
                <label for="price">Pris (kr) *</label>
                <input type="number" id="price" name="price" step="0.01" placeholder="f.eks. 179" required>
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button type="submit" style="flex: 1;">Lagre matrett</button>
                <a href="{{ url_for('admin') }}" class="btn btn-secondary" style="flex: 1; text-align: center;">Avbryt</a>
            </div>
        </form>
    </div>
</body>
</html>
